data:
  nih_path: "data/raw/NIH"
  shenzhen_path: "data/raw/Shenzhen"
  montgomery_path: "data/raw/Montgomery"
  processed_dir: "data/processed"
  image_size: 224
  num_hospitals: 5
  split_strategy: non_iid   # options: iid, non_iid
  split_alpha: 2.0          # Balance parameter for non-iid split


model:
  backbone: "vit_tiny"        # options: resnet50, vit_small
  embed_dim: 192
  mask_ratio: 0.75
  decoder_depth: 4

ssl:
  epochs_per_round: 2
  batch_size: 4
  lr: 0.0001
  limit_samples: 20000  # Ultimate run: 20,000 images
  optimizer: adamw

federated:
  rounds: 20            # Ultimate run: 20 rounds
  aggregation: fedprox       # options: fedavg, fedprox
  fedprox_mu: 0.01

finetuning:
  few_shot_k: 5             # k-shot per class
  epochs: 10
  lr: 1.0e-3

evaluation:
  test_set: montgomery
  metrics:
    - auc
    - accuracy
    - sensitivity
    - specificity
    - f1

logging:
  log_dir: experiments/logs/
  checkpoint_dir: experiments/checkpoints/
